<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Solicitud de Arrendamiento — Querétaro</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: #F5F4F1; color: #1A1A1A; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .shell { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
  .header { padding: 16px 20px 12px; border-bottom: 1px solid #E8E5E0; position: sticky; top: 0; background: #fff; z-index: 10; }
  .header-brand { font-family: 'Libre Baskerville', serif; font-size: 15px; color: #1A1A1A; }
  .header-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .paso-label { font-size: 12px; color: #888; margin-top: 2px; }
  .progress-bar { height: 3px; background: #ECEAE5; }
  .progress-fill { height: 100%; background: #1A4A35; transition: width 0.4s ease; }
  .steps-row { display: flex; padding: 12px 20px 10px; border-bottom: 1px solid #E8E5E0; }
  .step-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
  .step-item:not(:last-child)::after { content: ''; position: absolute; top: 11px; left: 50%; width: 100%; height: 1px; background: #E8E5E0; }
  .step-item.done::after { background: #1A4A35; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; position: relative; z-index: 1; background: #fff; border: 1.5px solid #D5D2CC; color: #888; transition: all 0.2s; }
  .step-item.done .step-num { background: #1A4A35; border-color: #1A4A35; color: #fff; }
  .step-item.active .step-num { background: #fff; border-color: #1A4A35; color: #1A4A35; border-width: 2px; }
  .step-lbl { font-size: 10px; color: #AAA; }
  .step-item.active .step-lbl, .step-item.done .step-lbl { color: #1A4A35; }
  .content { flex: 1; padding: 24px 20px 110px; }
  .step-title { font-family: 'Libre Baskerville', serif; font-size: 22px; color: #1A1A1A; margin-bottom: 6px; line-height: 1.25; }
  .step-desc { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.55; }
  .field { margin-bottom: 16px; }
  .lbl { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .req { color: #C0392B; margin-left: 2px; }
  input, select { width: 100%; padding: 12px 14px; border: 1.5px solid #D5D2CC; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: #1A1A1A; background: #fff; outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; }
  input:focus, select:focus { border-color: #1A4A35; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .divider { height: 1px; background: #E8E5E0; margin: 20px 0; }
  .section-lbl { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
  .hint { font-size: 12px; color: #999; margin-top: 5px; }
  .err-msg { font-size: 12px; color: #C0392B; margin-top: 5px; display: none; }
  .err-msg.show { display: block; }
  .doc-card { border: 1.5px solid #D5D2CC; border-radius: 10px; overflow: hidden; margin-bottom: 14px; transition: border-color 0.2s; }
  .doc-card.captured { border-color: #1A4A35; }
  .doc-head { padding: 13px 15px; display: flex; align-items: center; gap: 11px; }
  .doc-icon { width: 36px; height: 36px; border-radius: 8px; background: #F0EDE8; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .doc-card.captured .doc-icon { background: rgba(26,74,53,0.08); }
  .doc-name { font-size: 14px; font-weight: 600; }
  .doc-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .doc-badge { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
  .doc-badge.ok { background: #EAF3E8; color: #1A5C30; }
  .doc-badge.pending { background: #F0EDE8; color: #888; }
  .doc-preview { width: 100%; max-height: 130px; object-fit: cover; display: none; border-top: 1px solid #E8E5E0; }
  .doc-preview.show { display: block; }
  .doc-actions { display: flex; border-top: 1px solid #E8E5E0; }
  .doc-btn { flex: 1; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; background: none; border: none; cursor: pointer; color: #1A4A35; transition: background 0.15s; }
  .doc-btn:active { background: #F0EDE8; }
  .doc-btn + .doc-btn { border-left: 1px solid #E8E5E0; }
  .ref-block { border: 1.5px solid #E8E5E0; border-radius: 10px; padding: 15px; margin-bottom: 14px; }
  .ref-num { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; }
  .check-row { display: flex; gap: 11px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #E8E5E0; cursor: pointer; }
  .check-row:last-child { border-bottom: none; }
  .checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid #D5D2CC; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 12px; color: #fff; background: #fff; }
  .checkbox.checked { background: #1A4A35; border-color: #1A4A35; }
  .check-text { font-size: 13px; color: #333; line-height: 1.55; }
  .legal-box { background: #F5F4F1; border-radius: 8px; padding: 13px; font-size: 12px; color: #666; line-height: 1.6; margin-top: 18px; }
  .alert { padding: 11px 13px; border-radius: 8px; font-size: 13px; color: #7A5800; background: #FFF8E8; border: 1px solid #F0C850; margin-top: 10px; display: none; }
  .alert.show { display: block; }
  .footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: min(480px, 100%); padding: 13px 20px 26px; background: #fff; border-top: 1px solid #E8E5E0; display: flex; gap: 10px; }
  .btn-primary { flex: 1; padding: 13px 20px; background: #1A4A35; color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
  .btn-primary:active { opacity: 0.8; }
  .btn-primary:disabled { opacity: 0.38; pointer-events: none; }
  .btn-back { width: 50px; padding: 13px; background: #F0EDE8; color: #555; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .done-screen { padding: 40px 20px; text-align: center; }
  .done-icon { width: 64px; height: 64px; border-radius: 50%; background: #EAF3E8; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; color: #1A4A35; }
  .done-title { font-family: 'Libre Baskerville', serif; font-size: 22px; margin-bottom: 10px; }
  .done-sub { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 22px; }
  .folio-box { background: #F5F4F1; border-radius: 8px; padding: 14px; font-size: 13px; color: #555; }
  .folio-num { font-size: 17px; font-weight: 600; color: #1A1A1A; margin-top: 5px; letter-spacing: 0.05em; font-family: 'DM Mono', monospace; }
  .cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; }
  .cam-overlay.show { display: flex; }
  .cam-view { flex: 1; position: relative; overflow: hidden; }
  .cam-view video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-guide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .cam-rect { width: 88%; aspect-ratio: 1.586; border: 2px solid rgba(255,255,255,0.85); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.52); }
  .cam-bar { padding: 16px 20px 34px; display: flex; align-items: center; gap: 16px; background: rgba(0,0,0,0.85); }
  .shutter { width: 64px; height: 64px; border-radius: 50%; background: #fff; border: 4px solid rgba(255,255,255,0.3); cursor: pointer; flex-shrink: 0; }
  .shutter:active { transform: scale(0.9); }
  .cam-tip { font-size: 12px; color: rgba(255,255,255,0.5); flex: 1; line-height: 1.5; }
  .cam-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .cam-preview-screen { display: none; flex: 1; flex-direction: column; background: #000; }
  .cam-preview-screen.show { display: flex; }
  .cam-preview-screen img { flex: 1; object-fit: contain; width: 100%; }
  .cam-preview-bar { padding: 16px 20px 34px; display: flex; gap: 14px; background: rgba(0,0,0,0.85); }
  .cam-use-btn { flex: 1; padding: 11px; background: #fff; color: #1A1A1A; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .saving-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.92); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .saving-overlay.show { display: flex; }
  .saving-spinner { width: 40px; height: 40px; border: 3px solid #E8E5E0; border-top-color: #1A4A35; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .saving-txt { font-size: 14px; color: #555; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .slide-up { animation: slideUp 0.25s ease; }
  canvas { display: none; }
</style>
</head>
<body>

<!-- OVERLAY GUARDANDO -->
<div class="saving-overlay" id="savingOverlay">
  <div class="saving-spinner"></div>
  <div class="saving-txt" id="savingTxt">Guardando información...</div>
</div>

<!-- CÁMARA -->
<div class="cam-overlay" id="camOverlay">
  <canvas id="camCanvas"></canvas>
  <div class="cam-view" id="camView">
    <video id="camVideo" autoplay playsinline muted></video>
    <div class="cam-guide"><div class="cam-rect"></div></div>
  </div>
  <div class="cam-preview-screen" id="camPreview">
    <img id="camPreviewImg" src="" alt="Vista previa">
  </div>
  <div class="cam-bar" id="camBarShoot">
    <button class="cam-cancel" onclick="cerrarCamara()">Cancelar</button>
    <div style="flex:1;display:flex;justify-content:center">
      <button class="shutter" onclick="capturar()"></button>
    </div>
    <div class="cam-tip">Centra el documento dentro del marco</div>
  </div>
  <div class="cam-preview-bar" id="camBarPreview" style="display:none">
    <button class="cam-cancel" onclick="reintentar()">Reintentar</button>
    <button class="cam-use-btn" onclick="usarFoto()">Usar esta foto</button>
  </div>
</div>

<!-- APP -->
<div class="shell">
  <header class="header">
    <div class="header-row">
      <div>
        <div class="header-brand">Póliza Jurídica</div>
        <div class="header-sub">Solicitud de arrendamiento</div>
      </div>
      <div class="paso-label" id="pasoLabel">Paso 1 de 4</div>
    </div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="steps-row" id="stepsRow">
    <div class="step-item active" id="si0"><div class="step-num">1</div><div class="step-lbl">Datos</div></div>
    <div class="step-item" id="si1"><div class="step-num">2</div><div class="step-lbl">Documentos</div></div>
    <div class="step-item" id="si2"><div class="step-num">3</div><div class="step-lbl">Laboral</div></div>
    <div class="step-item" id="si3"><div class="step-num">4</div><div class="step-lbl">Referencias</div></div>
  </div>
  <main class="content" id="mainContent"></main>
  <nav class="footer" id="footer">
    <button class="btn-back" id="btnBack" onclick="anterior()" style="display:none">←</button>
    <button class="btn-primary" id="btnNext" onclick="siguiente()">Continuar</button>
  </nav>
</div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ── FIREBASE CONFIG ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA-jEFNrT1fbENLxwIOcsCmiXsar-X46vE",
  authDomain: "poliza-juridica-qro.firebaseapp.com",
  databaseURL: "https://poliza-juridica-qro-default-rtdb.firebaseio.com",
  projectId: "poliza-juridica-qro",
  storageBucket: "poliza-juridica-qro.firebasestorage.app",
  messagingSenderId: "120428537650",
  appId: "1:120428537650:web:b639daf9c5770b1061992b",
  measurementId: "G-JG9FJQ3LCG"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const storage = getStorage(app);

// ── ESTADO ────────────────────────────────────────────────────────
const state = {
  paso: 0,
  folioId: null,
  agenteId: null,
  datos: { nombre:'', curp:'', rfc:'', fechaNac:'', estadoCivil:'', regimen:'', telefono:'', correo:'', domicilio:'' },
  laboral: { empresa:'', puesto:'', antiguedad:'', ingresos:'', creditos:'ninguno' },
  docs: {},
  refs: [{},{},{},{},{}],
  checks: { buro:false, datos:false, veracidad:false }
};

// Leer folio e ID de agente desde URL ?folio=XXX&agente=YYY
const params = new URLSearchParams(window.location.search);
state.folioId  = params.get('folio')  || generarFolio();
state.agenteId = params.get('agente') || 'directo';

function generarFolio() {
  const ts = Date.now().toString(36).toUpperCase();
  return 'PJA-' + ts;
}

// ── GUARDAR EN FIRESTORE ──────────────────────────────────────────
async function guardarPasoEnFirestore(paso) {
  const docRef = doc(db, 'expedientes', state.folioId);
  const payload = {
    folio: state.folioId,
    agenteId: state.agenteId,
    estatus: 'en_proceso',
    pasoActual: paso,
    ultimaActualizacion: serverTimestamp(),
  };
  if (paso >= 0) payload.datos = state.datos;
  if (paso >= 2) payload.laboral = state.laboral;
  if (paso >= 3) payload.refs = state.refs;
  if (paso >= 3) payload.checks = state.checks;
  await setDoc(docRef, payload, { merge: true });
}

// ── SUBIR IMAGEN A STORAGE ────────────────────────────────────────
async function subirImagen(campo, base64) {
  const storageRef = ref(storage, `expedientes/${state.folioId}/${campo}.jpg`);
  await uploadString(storageRef, base64, 'data_url');
  const url = await getDownloadURL(storageRef);
  // Guardar URL en Firestore
  const docRef = doc(db, 'expedientes', state.folioId);
  await updateDoc(docRef, { [`documentos.${campo}`]: url });
  return url;
}

// ── ENVÍO FINAL ───────────────────────────────────────────────────
async function enviar() {
  mostrarGuardando('Guardando expediente...');
  try {
    // Subir imágenes a Storage
    for (const [campo, base64] of Object.entries(state.docs)) {
      if (base64 && base64.startsWith('data:')) {
        mostrarGuardando(`Subiendo ${campo.replace('_',' ')}...`);
        await subirImagen(campo, base64);
      }
    }
    // Guardar expediente final
    mostrarGuardando('Finalizando solicitud...');
    const docRef = doc(db, 'expedientes', state.folioId);
    await setDoc(docRef, {
      folio: state.folioId,
      agenteId: state.agenteId,
      estatus: 'pendiente_revision',
      pasoActual: 4,
      datos: state.datos,
      laboral: state.laboral,
      refs: state.refs,
      checks: state.checks,
      fechaEnvio: serverTimestamp(),
    }, { merge: true });
    ocultarGuardando();
    mostrarListo();
  } catch(e) {
    ocultarGuardando();
    alert('Error al guardar: ' + e.message + '\n\nIntenta de nuevo.');
    document.getElementById('btnNext').disabled = false;
    document.getElementById('btnNext').textContent = 'Enviar solicitud';
  }
}

function mostrarGuardando(txt) {
  document.getElementById('savingTxt').textContent = txt;
  document.getElementById('savingOverlay').classList.add('show');
}
function ocultarGuardando() {
  document.getElementById('savingOverlay').classList.remove('show');
}

function mostrarListo() {
  document.getElementById('stepsRow').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.getElementById('mainContent').innerHTML = `
    <div class="done-screen slide-up">
      <div class="done-icon">✓</div>
      <h1 class="done-title">Solicitud enviada</h1>
      <p class="done-sub">Tu expediente fue recibido. El agente revisará tus documentos y te contactará al correo <strong>${state.datos.correo || 'registrado'}</strong>.</p>
      <div class="folio-box">
        Folio de seguimiento
        <div class="folio-num">${state.folioId}</div>
      </div>
      <p style="font-size:12px;color:#999;margin-top:14px">Guarda este folio para dar seguimiento.</p>
    </div>`;
}

// ── CÁMARA ────────────────────────────────────────────────────────
let camStream = null, camTarget = null, camFotoData = null;

function abrirCamara(campo) {
  camTarget = campo; camFotoData = null;
  document.getElementById('camOverlay').classList.add('show');
  document.getElementById('camView').style.display = 'block';
  document.getElementById('camPreview').classList.remove('show');
  document.getElementById('camBarShoot').style.display = 'flex';
  document.getElementById('camBarPreview').style.display = 'none';
  navigator.mediaDevices?.getUserMedia({ video:{ facingMode:'environment', width:{ideal:1920} } })
    .then(s => { camStream = s; document.getElementById('camVideo').srcObject = s; })
    .catch(() => {
      document.getElementById('camView').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#666"><div style="font-size:40px">📷</div><div style="font-size:14px;color:#aaa">Cámara no disponible</div></div>';
    });
}
function capturar() {
  const v = document.getElementById('camVideo'), c = document.getElementById('camCanvas');
  c.width = v.videoWidth||1280; c.height = v.videoHeight||720;
  c.getContext('2d').drawImage(v,0,0);
  camFotoData = c.toDataURL('image/jpeg',0.88);
  document.getElementById('camPreviewImg').src = camFotoData;
  document.getElementById('camView').style.display = 'none';
  document.getElementById('camPreview').classList.add('show');
  document.getElementById('camBarShoot').style.display = 'none';
  document.getElementById('camBarPreview').style.display = 'flex';
}
function reintentar() {
  document.getElementById('camView').style.display = 'block';
  document.getElementById('camPreview').classList.remove('show');
  document.getElementById('camBarShoot').style.display = 'flex';
  document.getElementById('camBarPreview').style.display = 'none';
  camFotoData = null;
}
function usarFoto() {
  if (!camFotoData || !camTarget) return;
  state.docs[camTarget] = camFotoData;
  cerrarCamara(); renderPaso();
}
function cerrarCamara() {
  camStream?.getTracks().forEach(t => t.stop()); camStream = null;
  document.getElementById('camOverlay').classList.remove('show');
}
function subirArchivo(campo) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*,application/pdf';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => { state.docs[campo] = ev.target.result; renderPaso(); };
    r.readAsDataURL(f);
  };
  inp.click();
}

// Exponer funciones al scope global para los onclick del HTML dinámico
window.abrirCamara = abrirCamara;
window.subirArchivo = subirArchivo;
window.cerrarCamara = cerrarCamara;
window.capturar = capturar;
window.reintentar = reintentar;
window.usarFoto = usarFoto;
window.toggleCheck = toggleCheck;

// ── NAVEGACIÓN ────────────────────────────────────────────────────
function actualizar() {
  const pct = (state.paso / 4) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pasoLabel').textContent = `Paso ${state.paso + 1} de 4`;
  document.getElementById('btnBack').style.display = state.paso > 0 ? 'block' : 'none';
  ['si0','si1','si2','si3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step-item' + (i < state.paso ? ' done' : i === state.paso ? ' active' : '');
    el.querySelector('.step-num').textContent = i < state.paso ? '✓' : (i + 1);
  });
}

window.siguiente = async function() {
  if (!validar()) return;
  // Autoguardar en Firestore al avanzar
  try { await guardarPasoEnFirestore(state.paso); } catch(e) { console.warn('Autoguardado falló:', e); }
  if (state.paso < 3) {
    state.paso++;
    actualizar(); renderPaso(); window.scrollTo(0,0);
  } else {
    document.getElementById('btnNext').disabled = true;
    document.getElementById('btnNext').textContent = 'Enviando...';
    await enviar();
  }
};

window.anterior = function() {
  if (state.paso > 0) { state.paso--; actualizar(); renderPaso(); window.scrollTo(0,0); }
};

// ── VALIDACIÓN ────────────────────────────────────────────────────
function validar() {
  let ok = true;
  if (state.paso === 0) {
    if (!state.datos.nombre) { mostrarErr('eNombre','Requerido'); ok=false; }
    if (!state.datos.curp || state.datos.curp.length!==18) { mostrarErr('eCurp','El CURP debe tener 18 caracteres'); ok=false; }
    if (!state.datos.fechaNac) { mostrarErr('eFecha','Requerido'); ok=false; }
    if (!state.datos.telefono || state.datos.telefono.length!==10) { mostrarErr('eTel','Debe tener 10 dígitos'); ok=false; }
    if (!state.datos.correo || !state.datos.correo.includes('@')) { mostrarErr('eCorreo','Correo inválido'); ok=false; }
  }
  if (state.paso === 1) {
    const falta = !state.docs.ine_frente || !state.docs.ine_reverso || !state.docs.comprobante_ingresos;
    const a = document.getElementById('alertaDocs');
    if (falta) { a?.classList.add('show'); ok=false; } else a?.classList.remove('show');
  }
  if (state.paso === 2) {
    if (!state.laboral.empresa) { mostrarErr('eEmpresa','Requerido'); ok=false; }
    if (!state.laboral.ingresos) { mostrarErr('eIngresos','Requerido'); ok=false; }
  }
  if (state.paso === 3) {
    const refsOk = state.refs.filter(r=>r.nombre&&r.telefono).length >= 3;
    const chOk = state.checks.buro && state.checks.datos && state.checks.veracidad;
    if (!refsOk || !chOk) { document.getElementById('alertaRefs')?.classList.add('show'); ok=false; }
  }
  return ok;
}
function mostrarErr(id, msg) { const e=document.getElementById(id); if(e){e.textContent=msg;e.classList.add('show');} }

// ── RENDERS ───────────────────────────────────────────────────────
function renderPaso() {
  const c = document.getElementById('mainContent');
  if (state.paso===0) c.innerHTML = renderDatos();
  if (state.paso===1) c.innerHTML = renderDocs();
  if (state.paso===2) c.innerHTML = renderLaboral();
  if (state.paso===3) c.innerHTML = renderRefs();
  c.classList.remove('slide-up'); void c.offsetWidth; c.classList.add('slide-up');
  bindInputs();
}

function renderDatos() {
  const d = state.datos;
  return `
  <h1 class="step-title">Datos personales</h1>
  <p class="step-desc">Ingresa tus datos tal como aparecen en tu INE vigente.</p>
  <div class="field"><label class="lbl">Nombre completo <span class="req">*</span></label>
    <input type="text" id="iNombre" value="${d.nombre}" placeholder="Como aparece en tu INE">
    <div class="err-msg" id="eNombre"></div></div>
  <div class="row2">
    <div class="field"><label class="lbl">CURP <span class="req">*</span></label>
      <input type="text" id="iCurp" value="${d.curp}" maxlength="18" placeholder="18 caracteres" style="text-transform:uppercase;font-size:13px">
      <div class="err-msg" id="eCurp"></div></div>
    <div class="field"><label class="lbl">RFC</label>
      <input type="text" id="iRfc" value="${d.rfc}" maxlength="13" placeholder="13 caracteres" style="text-transform:uppercase;font-size:13px"></div>
  </div>
  <div class="row2">
    <div class="field"><label class="lbl">Fecha de nacimiento <span class="req">*</span></label>
      <input type="date" id="iFecha" value="${d.fechaNac}">
      <div class="err-msg" id="eFecha"></div></div>
    <div class="field"><label class="lbl">Estado civil</label>
      <select id="iEstadoCivil">
        <option value="">Seleccionar</option>
        <option value="soltero" ${d.estadoCivil==='soltero'?'selected':''}>Soltero/a</option>
        <option value="casado" ${d.estadoCivil==='casado'?'selected':''}>Casado/a</option>
        <option value="divorciado" ${d.estadoCivil==='divorciado'?'selected':''}>Divorciado/a</option>
        <option value="viudo" ${d.estadoCivil==='viudo'?'selected':''}>Viudo/a</option>
        <option value="union_libre" ${d.estadoCivil==='union_libre'?'selected':''}>Unión libre</option>
      </select></div>
  </div>
  ${d.estadoCivil==='casado'?`<div class="field"><label class="lbl">Régimen matrimonial</label>
    <select id="iRegimen">
      <option value="">Seleccionar</option>
      <option value="separacion" ${d.regimen==='separacion'?'selected':''}>Separación de bienes</option>
      <option value="sociedad" ${d.regimen==='sociedad'?'selected':''}>Sociedad conyugal</option>
    </select></div>`:''}
  <div class="divider"></div><div class="section-lbl">Contacto</div>
  <div class="row2">
    <div class="field"><label class="lbl">Celular <span class="req">*</span></label>
      <input type="tel" id="iTel" value="${d.telefono}" maxlength="10" placeholder="10 dígitos">
      <div class="err-msg" id="eTel"></div></div>
    <div class="field"><label class="lbl">Correo <span class="req">*</span></label>
      <input type="email" id="iCorreo" value="${d.correo}" placeholder="tu@correo.com">
      <div class="err-msg" id="eCorreo"></div></div>
  </div>
  <div class="field"><label class="lbl">Domicilio actual</label>
    <input type="text" id="iDomicilio" value="${d.domicilio}" placeholder="Calle, número, colonia, municipio"></div>
  <div class="legal-box">Tus datos se tratan conforme a la <strong>Ley Federal de Protección de Datos Personales</strong> y se usan únicamente para el proceso de arrendamiento.</div>`;
}

function docCard(campo, icono, nombre, desc, req) {
  const img = state.docs[campo];
  return `<div class="doc-card ${img?'captured':''}" id="dc_${campo}">
    <div class="doc-head">
      <div class="doc-icon">${icono}</div>
      <div style="flex:1"><div class="doc-name">${nombre}${req?'<span class="req"> *</span>':''}</div><div class="doc-sub">${desc}</div></div>
      <span class="doc-badge ${img?'ok':'pending'}">${img?'✓ Listo':'Pendiente'}</span>
    </div>
    ${img?`<img src="${img}" class="doc-preview show" alt="${nombre}">`:''}
    <div class="doc-actions">
      <button class="doc-btn" onclick="abrirCamara('${campo}')">📷 ${img?'Retomar':'Foto'}</button>
      <button class="doc-btn" onclick="subirArchivo('${campo}')">↑ Subir</button>
    </div></div>`;
}

function renderDocs() {
  return `<h1 class="step-title">Documentos</h1>
  <p class="step-desc">Toma foto a cada documento. Asegúrate que el texto sea legible.</p>
  ${docCard('ine_frente','🪪','INE — Frente','Anverso de tu credencial de elector',true)}
  ${docCard('ine_reverso','🪪','INE — Reverso','Reverso de tu credencial de elector',true)}
  ${docCard('comprobante_ingresos','📊','Comprobante de ingresos','Estado de cuenta o recibo de nómina',true)}
  ${docCard('comprobante_domicilio','🏠','Comprobante de domicilio','Recibo de luz, agua o teléfono — máx. 3 meses',false)}
  <div class="alert" id="alertaDocs">Los documentos marcados con * son obligatorios para continuar.</div>`;
}

function renderLaboral() {
  const l = state.laboral;
  return `<h1 class="step-title">Información laboral</h1>
  <p class="step-desc">Se usa para verificar tu capacidad de pago.</p>
  <div class="field"><label class="lbl">Empresa o negocio <span class="req">*</span></label>
    <input type="text" id="iEmpresa" value="${l.empresa}" placeholder="Nombre de la empresa o negocio">
    <div class="err-msg" id="eEmpresa"></div></div>
  <div class="row2">
    <div class="field"><label class="lbl">Puesto</label>
      <input type="text" id="iPuesto" value="${l.puesto}" placeholder="Ej. Gerente, Socia..."></div>
    <div class="field"><label class="lbl">Antigüedad</label>
      <select id="iAntiguedad">
        <option value="">Seleccionar</option>
        <option value="menos_6m" ${l.antiguedad==='menos_6m'?'selected':''}>Menos de 6 meses</option>
        <option value="6m_1y" ${l.antiguedad==='6m_1y'?'selected':''}>6 meses – 1 año</option>
        <option value="1y_3y" ${l.antiguedad==='1y_3y'?'selected':''}>1 – 3 años</option>
        <option value="mas_3y" ${l.antiguedad==='mas_3y'?'selected':''}>Más de 3 años</option>
      </select></div>
  </div>
  <div class="field"><label class="lbl">Ingresos mensuales <span class="req">*</span></label>
    <input type="number" id="iIngresos" value="${l.ingresos}" placeholder="0">
    <div class="hint">Se validará contra los documentos que subiste.</div>
    <div class="err-msg" id="eIngresos"></div></div>
  <div class="divider"></div><div class="section-lbl">Créditos activos</div>
  <div class="field"><label class="lbl">¿Tienes créditos vigentes?</label>
    <select id="iCreditos">
      <option value="ninguno" ${l.creditos==='ninguno'?'selected':''}>No tengo créditos activos</option>
      <option value="menos_3k" ${l.creditos==='menos_3k'?'selected':''}>Menos de $3,000/mes</option>
      <option value="3k_10k" ${l.creditos==='3k_10k'?'selected':''}>$3,000 – $10,000/mes</option>
      <option value="mas_10k" ${l.creditos==='mas_10k'?'selected':''}>Más de $10,000/mes</option>
    </select>
    <div class="hint">Se verificará en Buró de Crédito con tu autorización.</div></div>`;
}

function renderRefs() {
  const tiposRel = ['','Familiar','Laboral','Amistad','Arrendador anterior'];
  let html = `<h1 class="step-title">Referencias y autorización</h1>
  <p class="step-desc">Mínimo 3 referencias. Se les llamará para confirmar tu historial.</p>`;
  state.refs.forEach((r,i) => {
    html += `<div class="ref-block"><div class="ref-num">Referencia ${i+1}${i<3?'<span class="req"> *</span>':''}</div>
    <div class="field"><label class="lbl">Nombre completo</label>
      <input type="text" data-ref="${i}" data-campo="nombre" value="${r.nombre||''}" placeholder="Nombre y apellidos"></div>
    <div class="row2">
      <div class="field"><label class="lbl">Relación</label>
        <select data-ref="${i}" data-campo="tipo">${tiposRel.map(t=>`<option value="${t}" ${r.tipo===t?'selected':''}>${t||'Seleccionar'}</option>`).join('')}</select></div>
      <div class="field"><label class="lbl">Teléfono</label>
        <input type="tel" data-ref="${i}" data-campo="telefono" value="${r.telefono||''}" maxlength="10" placeholder="10 dígitos"></div>
    </div></div>`;
  });
  html += `<div class="divider"></div><div class="section-lbl">Autorizaciones</div>
  <div class="check-row" onclick="toggleCheck('buro')">
    <div class="checkbox ${state.checks.buro?'checked':''}" id="cb_buro">${state.checks.buro?'✓':''}</div>
    <div class="check-text">Autorizo la consulta a <strong>Buró de Crédito</strong> conforme a la Ley para Regular las Sociedades de Información Crediticia.</div></div>
  <div class="check-row" onclick="toggleCheck('datos')">
    <div class="checkbox ${state.checks.datos?'checked':''}" id="cb_datos">${state.checks.datos?'✓':''}</div>
    <div class="check-text">Acepto el tratamiento de mis <strong>datos personales</strong> conforme a la LFPDPPP.</div></div>
  <div class="check-row" onclick="toggleCheck('veracidad')">
    <div class="checkbox ${state.checks.veracidad?'checked':''}" id="cb_veracidad">${state.checks.veracidad?'✓':''}</div>
    <div class="check-text">Declaro que toda la información proporcionada es <strong>verídica y auténtica</strong>.</div></div>
  <div class="alert" id="alertaRefs">Completa al menos 3 referencias y acepta todas las autorizaciones.</div>`;
  return html;
}

function bindInputs() {
  if (state.paso===0) {
    bind('iNombre', v=>state.datos.nombre=v);
    bind('iCurp', v=>state.datos.curp=v.toUpperCase(), true);
    bind('iRfc', v=>state.datos.rfc=v.toUpperCase(), true);
    bind('iFecha', v=>state.datos.fechaNac=v);
    bindSel('iEstadoCivil', v=>{state.datos.estadoCivil=v; renderPaso();});
    bindSel('iRegimen', v=>state.datos.regimen=v);
    bind('iTel', v=>state.datos.telefono=v.replace(/\D/g,''));
    bind('iCorreo', v=>state.datos.correo=v);
    bind('iDomicilio', v=>state.datos.domicilio=v);
  }
  if (state.paso===2) {
    bind('iEmpresa', v=>state.laboral.empresa=v);
    bind('iPuesto', v=>state.laboral.puesto=v);
    bindSel('iAntiguedad', v=>state.laboral.antiguedad=v);
    bind('iIngresos', v=>state.laboral.ingresos=v);
    bindSel('iCreditos', v=>state.laboral.creditos=v);
  }
  if (state.paso===3) {
    document.querySelectorAll('[data-ref]').forEach(el => {
      const i=parseInt(el.dataset.ref), campo=el.dataset.campo;
      el.addEventListener('input', ()=>state.refs[i][campo]=el.value);
      el.addEventListener('change', ()=>state.refs[i][campo]=el.value);
    });
  }
}
function bind(id,fn,upper) { const e=document.getElementById(id); if(!e)return; e.addEventListener('input',()=>{fn(upper?e.value.toUpperCase():e.value); if(upper)e.value=e.value.toUpperCase();}); }
function bindSel(id,fn) { const e=document.getElementById(id); if(!e)return; e.addEventListener('change',()=>fn(e.value)); }
function toggleCheck(k) { state.checks[k]=!state.checks[k]; const e=document.getElementById('cb_'+k); if(e){e.className='checkbox'+(state.checks[k]?' checked':''); e.textContent=state.checks[k]?'✓':'';} }

// ── INIT ──────────────────────────────────────────────────────────
actualizar();
renderPaso();
</script>
</body>
</html>
